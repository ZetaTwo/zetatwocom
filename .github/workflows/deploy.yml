name: Deploy Hugo site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-progress runs but let already-deployed runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.123.7

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Hugo CLI (extended, pinned)
        run: |
          wget -O "${RUNNER_TEMP}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${RUNNER_TEMP}/hugo.deb"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        # Use the baseURL from config.toml ("https://zeta-two.com/") rather than
        # configure-pages' base_url output — the latter sometimes returns the
        # project-pages URL (https://zetatwo.github.io/zetatwocom/) even when a
        # custom domain is set, which embeds /zetatwocom/ in every asset path.
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
