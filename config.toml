baseURL = "https://zeta-two.com/"
languageCode = "en-us"
title = "Zeta-Two.com"
theme = "zetatwo"

# disqusShortname = "zetatwo"  # deferred: previous Disqus thread ID, to be reintroduced as a baked-in static archive in a separate project

# Hugo 0.128+ moved this to [pagination].pagerSize; this top-level key
# still works in 0.123 and is forward-compatible (just deprecated later).
paginate = 5

[params]
  description = "My blog about technology, security and life."
  author = "Calle Svensson"
  email = "calle.svensson@zeta-two.com"
  github_username = "ZetaTwo"
  twitter_username = "zetatwo"
  youtube_username = "ZetaTwo"
  google_analytics_id = "UA-1543879-1"  # Universal Analytics — deprecated by Google as of July 2024; kept for fidelity, consider removing or replacing with GA4

[permalinks]
  # Mirror Jekyll's /{category}/{year}/{month}/{day}/{slug}/ URL structure.
  # Posts live at content/posts/<cat>/<date>-<slug>.md; :sections[1:] drops the
  # leading "posts" so the URL becomes /<cat>/<year>/<month>/<day>/<slug>/.
  # Requires an _index.md in each category subdirectory so Hugo treats the
  # category as a sub-section (otherwise :sections is just ["posts"]).
  # The :slug placeholder reads per-post `slug:` frontmatter (added in step 4).
  posts = "/:sections[1:]/:year/:month/:day/:slug/"

[outputFormats.RSS]
  # Match Jekyll's /feed.xml URL instead of Hugo's default /index.xml.
  baseName = "feed"

[markup.goldmark.renderer]
  unsafe = true  # Jekyll posts contain raw HTML

[markup.goldmark.extensions.typographer]
  disable = true  # off so `m'` (prime) in $..$ math stays straight; KaTeX wants ASCII apostrophe

[markup.highlight]
  style = "monokai"
  noClasses = false
